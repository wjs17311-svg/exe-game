<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NouerA 페인터 꾸미기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        :root {
            /* PC 기본값: 이동 없음 */
            --game-offset-y: 0px;
        }

        /* 📱 모바일(터치 기기)에서만 아래로 내리는 오프셋 적용 */
        @media (hover: none) and (pointer: coarse) {
            :root {
                /* 👉 이 값을 조절하면 모바일에서만 게임이 위/아래로 이동합니다. (양수 = 아래로) */
                --game-offset-y: 58px;
            }
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            height: 100dvh;
            overflow: hidden; background-color: #eee; 
            display: flex; flex-direction: column; 
        }

        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .canvas-container {
            position: absolute !important;
            top: 0; left: 0;
            z-index: 5;
            filter: url(#pixel-filter);
        }

        .game-container { 
            width: 100vw; height: 100vh; height: 100dvh; position: relative; touch-action: none; 
            transform: translateY(var(--game-offset-y));
        }

        /* =========================================
           🌟 6. 가로 회전 안내 팝업 (rotate.png)
           👉 세로 모드일 때 전체 화면에 표시됩니다. 가로로 돌리면 자동으로 사라짐.
              이미지 크기/위치를 조절하려면 아래 background-size / background-position을 수정하세요.
              (cover: 화면 꽉 채움 / contain: 이미지 비율 유지하며 안에 맞춤)
           ========================================= */
        #rotate-msg { 
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; 
            box-sizing: border-box;
            padding: 0%; /* 👉 이 값을 조절하면 이미지 크기(현재 약 97%)가 바뀝니다 */
            background-image: url('rotate.png');
            background-size: contain; /* 이미지가 절대 잘리지 않고 영역 안에 꽉 맞게 들어감 */
            background-origin: content-box;
            background-clip: content-box;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 9999; justify-content: center; align-items: center; text-align: center; 
        }
        @media screen and (orientation: portrait) { #rotate-msg { display: flex; } .game-container { display: none; } }

        #bg-img {
            position: absolute;
            z-index: 1; 
            pointer-events: none;
        }

        #ui-layer {
            position: absolute; z-index: 10; pointer-events: none; 
        }

        #draw-area { 
            position: absolute; 
            top: 17.5%; left: 13.5%; width: 69.5%; height: 100%;   
            background-color: transparent !important; 
            border: none !important; 
            pointer-events: none; 
            z-index: 1; 
        }

        /* 🌟 모든 클릭 영역 투명화 처리 */
        .hidden-btn, .thickness-option, .shape-option, #credits-close-btn {
            position: absolute; pointer-events: auto; cursor: pointer;
            background-color: transparent !important; border: none !important;
            color: transparent !important; /* 글자와 이모지도 투명하게 */
            display: flex; justify-content: center; align-items: center;
        }

        /* 메인 도구 버튼들 */
        #mode-draw { top: 25%; left: 9.7%; width: 60px; height: 50px; } 
        #mode-spray { top: 32%; left: 9.7%; width: 60px; height: 50px; }
        #btn-shapes { top: 38.8%; left: 9.7%; width: 60px; height: 50px; } 
        #clear-btn { top: 45%; left: 9.7%; width: 60px; height: 55px; }
        #submit-btn { top: 8%; left: 15.5%; width: 230px; height: 40px; }
        
        #btn-help { top: 8%; left: 73%; width: 175px; height: 50px; }
        #btn-credits { top: 8%; left: 81.6%; width: 175px; height: 50px; }

        /* 팝업창 공통 스타일 */
        .popup-panel {
            position: absolute;
            display: none; 
            z-index: 20;
            pointer-events: auto; 
            color: transparent; text-align: center; /* 글자 숨김 */
            background-color: transparent; border: none;
        }

        /* =========================================
           🌟 1. 선 그리기 팝업 (draw.png) 및 굵기 버튼
           ========================================= */
        #popup-thickness { 
            top: 19%; left: 13.5%; 
            width: 180px; height: 160px; 
            background-image: url('draw.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        /* 👉 1px, 3px, 5px, 8px 개별 위치 및 크기 (팝업창 기준) */
        #thick-1 { top: 10%; left: 20%; width: 130px; height: 30px; }
        #thick-3 { top: 30%; left: 20%; width: 130px; height: 30px; }
        #thick-5 { top: 50%; left: 20%; width: 130px; height: 30px; }
        #thick-8 { top: 70%; left: 20%; width: 130px; height: 30px; }


        /* =========================================
           🌟 2. 도형 선택 팝업 (cube.png) 및 9개 버튼
           ========================================= */
        #popup-shapes { 
            top: 30%; left: 13.5%; 
            width: 180px; height: 180px; 
            background-image: url('cube.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        /* 👉 9개 도형 개별 위치 및 크기 (팝업창 기준) */
        #shape-heart  { top: 10%; left: 10%; width: 40px; height: 40px; }
        #shape-star   { top: 10%; left: 38%; width: 40px; height: 40px; }
        #shape-speech { top: 10%; left: 66%; width: 40px; height: 40px; }
        #shape-rect     { top: 38%; left: 10%; width: 40px; height: 40px; }
        #shape-triangle { top: 38%; left: 38%; width: 40px; height: 40px; }
        #shape-cloud    { top: 38%; left: 66%; width: 40px; height: 40px; }
        #shape-lightning { top: 66%; left: 10%; width: 40px; height: 40px; }
        #shape-arrow     { top: 66%; left: 38%; width: 40px; height: 40px; }
        #shape-circle    { top: 66%; left: 66%; width: 40px; height: 40px; }


        /* =========================================
           🌟 3. 크레딧 팝업 (credit.png)
           👉 여기 top / left / width / height 값만 바꾸면 위치·크기 조절됨
              (top, left는 팝업의 "중심점" 좌표 - transform이 중심 정렬을 해줌)
           ========================================= */
        #popup-credits { 
            width: 70%; height: 70%; 
            top: 40%; left: 62%; 
            transform: translate(-50%, -50%); 
            background-image: url('credit.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }


        /* =========================================
           🌟 4. 제출 팝업 (send.png)
           👉 여기 top / left / width / height 값만 바꾸면 위치·크기 조절됨
              (top, left는 팝업의 "중심점" 좌표 - transform이 중심 정렬을 해줌)
           ========================================= */
        #popup-send { 
            width: 50%; height: 50%; 
            top: 54%; left: 52%; 
            transform: translate(-50%, -50%); 
            background-image: url('send.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            z-index: 9999; /* 화면 제일 위에 뜨도록 설정 */
        }

        /* =========================================
           🌟 5. 도움말 팝업 (doum.png)
           👉 여기 top / left / width / height 값만 바꾸면 위치·크기 조절됨
              (top, left는 팝업의 "중심점" 좌표 - transform이 중심 정렬을 해줌)
           ========================================= */
        #popup-help { 
            width: 43%; height: 43%; 
            top: 30%; left: 74.5%; 
            transform: translate(-50%, -50%); 
            background-image: url('doum.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* 색상 팔레트 위치 (색상 버튼도 투명화 완료) */
        #c-white { top: 31%; left: 85%; width: 30px; height: 30px; }
        #c-black { top: 31%; left: 87.3%; width: 30px; height: 30px; }
        #c-gray { top: 36%; left: 85%; width: 30px; height: 30px; }
        #c-darkgray { top: 36%; left: 87.3%; width: 30px; height: 30px; }
        #c-red { top: 41%; left: 85%; width: 30px; height: 30px; }
        #c-darkred { top: 41%; left: 87.3%; width: 30px; height: 30px; }
        #c-yellow { top: 46%; left: 85%; width: 30px; height: 30px; }
        #c-darkyellow { top: 46%; left: 87.3%; width: 30px; height: 30px; }
        #c-green { top: 51%; left: 85%; width: 30px; height: 30px; }
        #c-darkgreen { top: 51%; left: 87.3%; width: 30px; height: 30px; }
        #c-mint { top: 56%; left: 85%; width: 30px; height: 30px; }
        #c-darkmint { top: 56%; left: 87.3%; width: 30px; height: 30px; }
        #c-blue { top: 60.8%; left: 85%; width: 30px; height: 30px; }
        #c-darkblue { top: 60.8%; left: 87.3%; width: 30px; height: 30px; }
        #c-purple { top: 65.7%; left: 85%; width: 30px; height: 30px; }
        #c-darkpurple { top: 65.7%; left: 87.3%; width: 30px; height: 30px; }
        #c-skin { top: 70.6%; left: 85%; width: 30px; height: 30px; }
        #c-darkskin { top: 70.6%; left: 87.3%; width: 30px; height: 30px; }
        #c-greenmint { top: 75.4%; left: 85%; width: 30px; height: 30px; }
        #c-darkgreenmint { top: 75.4%; left: 87.3%; width: 30px; height: 30px; }
        #c-skyblue { top: 80.1%; left: 85%; width: 30px; height: 30px; }
        #c-darkskyblue { top: 80.1%; left: 87.3%; width: 30px; height: 30px; }
        #c-lightpurple { top: 85%; left: 85%; width: 30px; height: 30px; }
        #c-darklightpurple { top: 85%; left: 87.3%; width: 30px; height: 30px; }
        #c-pink { top: 89.7%; left: 85%; width: 30px; height: 30px; }
        #c-magenta { top: 89.7%; left: 87.3%; width: 30px; height: 30px; }
        #c-orange { top: 94.4%; left: 85%; width: 30px; height: 30px; }
        #c-brown { top: 94.4%; left: 87.3%; width: 30px; height: 30px; }
    </style>
</head>
<body>

    <div id="rotate-msg"></div>

    <svg width="0" height="0" style="position: absolute; pointer-events: none; z-1: -1;">
        <filter id="pixel-filter">
            <feComponentTransfer>
                <feFuncA type="discrete" tableValues="0 1"/>
            </feComponentTransfer>
        </filter>
    </svg>

    <div class="game-container">
        <img id="bg-img" src="" alt="background">
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            <div id="draw-area"></div>

            <div id="mode-draw" class="hidden-btn">선그리기</div>
            <div id="mode-spray" class="hidden-btn">스프레이</div>
            <div id="btn-shapes" class="hidden-btn">도형</div>
            
            <div id="clear-btn" class="hidden-btn">되돌리기</div>
            <div id="submit-btn" class="hidden-btn">제출</div>
            
            <div id="btn-help" class="hidden-btn">도움말</div>
            <div id="btn-credits" class="hidden-btn">크레딧</div>

            <div id="popup-thickness" class="popup-panel">
                <div id="thick-1" class="thickness-option" data-width="1">1px</div>
                <div id="thick-3" class="thickness-option" data-width="3">3px</div>
                <div id="thick-5" class="thickness-option" data-width="5">5px</div>
                <div id="thick-8" class="thickness-option" data-width="8">8px</div>
            </div>

            <div id="popup-shapes" class="popup-panel">
                <div id="shape-heart" class="shape-option" data-shape="heart">💖</div>
                <div id="shape-star" class="shape-option" data-shape="star">⭐</div>
                <div id="shape-speech" class="shape-option" data-shape="speech">💬</div>
                
                <div id="shape-rect" class="shape-option" data-shape="rect">🟦</div>
                <div id="shape-triangle" class="shape-option" data-shape="triangle">🔺</div>
                <div id="shape-cloud" class="shape-option" data-shape="cloud">☁️</div>
                
                <div id="shape-lightning" class="shape-option" data-shape="lightning">⚡</div>
                <div id="shape-arrow" class="shape-option" data-shape="arrow">➡️</div>
                <div id="shape-circle" class="shape-option" data-shape="circle">🔴</div>
            </div>

            <div id="popup-help" class="popup-panel large-popup"></div>

            <div id="popup-credits" class="popup-panel"></div>

            <div id="popup-send" class="popup-panel"></div>

            <div id="c-white" class="hidden-btn color-btn" data-color="#ffffff">흰색</div>
            <div id="c-black" class="hidden-btn color-btn" data-color="#353130">검은색</div>
            <div id="c-gray" class="hidden-btn color-btn" data-color="#cac9bf">회색</div>
            <div id="c-darkgray" class="hidden-btn color-btn" data-color="#4f4d4e">진회색</div>
            <div id="c-red" class="hidden-btn color-btn" data-color="#cc2e2f">빨강</div>
            <div id="c-darkred" class="hidden-btn color-btn" data-color="#7b1c1f">진빨강</div>
            <div id="c-yellow" class="hidden-btn color-btn" data-color="#ded53d">노랑</div>
            <div id="c-darkyellow" class="hidden-btn color-btn" data-color="#83812b">진노랑</div>
            <div id="c-green" class="hidden-btn color-btn" data-color="#4ca338">초록</div>
            <div id="c-darkgreen" class="hidden-btn color-btn" data-color="#185f32">진초록</div>
            <div id="c-mint" class="hidden-btn color-btn" data-color="#5fb2af">민트</div>
            <div id="c-darkmint" class="hidden-btn color-btn" data-color="#0b6564">진민트</div>
            <div id="c-blue" class="hidden-btn color-btn" data-color="#20448b">파랑</div>
            <div id="c-darkblue" class="hidden-btn color-btn" data-color="#1a2b56">진파랑</div>
            <div id="c-purple" class="hidden-btn color-btn" data-color="#983c82">보라</div>
            <div id="c-darkpurple" class="hidden-btn color-btn" data-color="#5b2465">진보라</div>
            <div id="c-skin" class="hidden-btn color-btn" data-color="#eae8a1">살색</div>
            <div id="c-darkskin" class="hidden-btn color-btn" data-color="#928a45">진살색</div>
            <div id="c-greenmint" class="hidden-btn color-btn" data-color="#98c6a9">초록민트</div>
            <div id="c-darkgreenmint" class="hidden-btn color-btn" data-color="#145a59">진초민</div>
            <div id="c-skyblue" class="hidden-btn color-btn" data-color="#8ec5cf">하늘</div>
            <div id="c-darkskyblue" class="hidden-btn color-btn" data-color="#286aa5">진하늘</div>
            <div id="c-lightpurple" class="hidden-btn color-btn" data-color="#8e89b7">연보라</div>
            <div id="c-darklightpurple" class="hidden-btn color-btn" data-color="#192b5f">진연보라</div>
            <div id="c-pink" class="hidden-btn color-btn" data-color="#be5c8f">핑크</div>
            <div id="c-magenta" class="hidden-btn color-btn" data-color="#6e2269">자주</div>
            <div id="c-orange" class="hidden-btn color-btn" data-color="#d87926">주황</div>
            <div id="c-brown" class="hidden-btn color-btn" data-color="#803c21">갈색</div>
        </div>
    </div>

    <script>
        const bgImageUrl = 'image_0.png'; 
        const canvas = new fabric.Canvas('gameCanvas', { isDrawingMode: true });
        let activeColor = '#ffffff'; 
        let currentBrushWidth = 5; 

        canvas.freeDrawingBrush.color = activeColor;
        canvas.freeDrawingBrush.width = currentBrushWidth;
        canvas.freeDrawingBrush.strokeLineCap = 'square'; 
        canvas.freeDrawingBrush.strokeLineJoin = 'miter'; 

        function resizeCanvasToWindow() {
            // 🌟 주소창이 떠 있든 사라졌든, 실제로 지금 보이는 화면 크기를 기준으로 맞춤
            const vv = window.visualViewport;
            const windowWidth = vv ? vv.width : window.innerWidth;
            const windowHeight = vv ? vv.height : window.innerHeight;
            canvas.setWidth(windowWidth);
            canvas.setHeight(windowHeight);

            if (window.globalBgImg) {
                const bgImg = window.globalBgImg;
                const scaleX = windowWidth / bgImg.width;
                const scaleY = windowHeight / bgImg.height;
                const mainScale = Math.max(scaleX, scaleY); 

                const htmlBg = document.getElementById('bg-img');
                htmlBg.style.width = (bgImg.width * mainScale) + 'px';
                htmlBg.style.height = (bgImg.height * mainScale) + 'px';
                htmlBg.style.left = (windowWidth / 2) + 'px';
                htmlBg.style.top = (windowHeight / 2) + 'px';
                htmlBg.style.transform = 'translate(-50%, -50%)';
                
                canvas.renderAll();

                const uiLayer = document.getElementById('ui-layer');
                const imgRenderWidth = bgImg.width * mainScale;
                const imgRenderHeight = bgImg.height * mainScale;
                const imgLeft = (windowWidth - imgRenderWidth) / 2;
                const imgTop = (windowHeight - imgRenderHeight) / 2;

                uiLayer.style.width = imgRenderWidth + 'px';
                uiLayer.style.height = imgRenderHeight + 'px';
                uiLayer.style.left = imgLeft + 'px';
                uiLayer.style.top = imgTop + 'px';

                setTimeout(() => {
                    const drawArea = document.getElementById('draw-area');
                    if(drawArea) {
                        const rect = drawArea.getBoundingClientRect();
                        // 🌟 캔버스 엘리먼트 자체의 화면상 위치를 기준으로 상대 좌표를 계산
                        //    (game-container에 transform/offset이 있어도 항상 정확하게 맞음)
                        const canvasRect = canvas.upperCanvasEl.getBoundingClientRect();
                        canvas.clipPath = new fabric.Rect({
                            left: rect.left - canvasRect.left,
                            top: rect.top - canvasRect.top,
                            width: rect.width,
                            height: rect.height,
                            absolutePositioned: true
                        });
                        canvas.renderAll();
                    }
                }, 50);
            }
        }

        fabric.Image.fromURL(bgImageUrl, function(bgImg) {
            if (!bgImg) {
                alert("배경 이미지(image_0.png)를 찾을 수 없습니다!");
                return;
            }
            window.globalBgImg = bgImg; 
            document.getElementById('bg-img').src = bgImageUrl;
            resizeCanvasToWindow();
            canvas.freeDrawingBrush.clipPath = null;
        }, { crossOrigin: 'anonymous' });

        window.addEventListener('resize', resizeCanvasToWindow);
        window.addEventListener("orientationchange", function() {
            // 사파리 주소창이 사라지는 애니메이션이 끝날 때까지 여러 번 재계산
            setTimeout(resizeCanvasToWindow, 100);
            setTimeout(resizeCanvasToWindow, 300);
            setTimeout(resizeCanvasToWindow, 600);
            setTimeout(resizeCanvasToWindow, 1000);
        });

        // 🌟 iOS 사파리는 주소창이 사라지면서 실제 보이는 화면 크기가 바뀌는데,
        //    resize 이벤트가 안 뜨는 경우가 있어서 visualViewport로 따로 감지함
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', resizeCanvasToWindow);
            window.visualViewport.addEventListener('scroll', resizeCanvasToWindow);
        }

        const changeMode = (draw) => { canvas.isDrawingMode = draw; };

        function closeAllToolPopups() {
            document.getElementById('popup-thickness').style.display = 'none';
            document.getElementById('popup-shapes').style.display = 'none';
        }

        document.getElementById('mode-draw').addEventListener('click', () => {
            canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
            canvas.freeDrawingBrush.color = activeColor;
            canvas.freeDrawingBrush.width = currentBrushWidth;
            canvas.freeDrawingBrush.strokeLineCap = 'square'; 
            canvas.freeDrawingBrush.strokeLineJoin = 'miter'; 
            changeMode(true);
            
            const popup = document.getElementById('popup-thickness');
            const isShowing = popup.style.display === 'block';
            closeAllToolPopups();
            if (!isShowing) popup.style.display = 'block';
        });

        document.querySelectorAll('.thickness-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentBrushWidth = parseInt(e.target.getAttribute('data-width'), 10);
                if(canvas.freeDrawingBrush) {
                    canvas.freeDrawingBrush.width = currentBrushWidth;
                }
                document.getElementById('popup-thickness').style.display = 'none';
            });
        });

        document.getElementById('mode-spray').addEventListener('click', () => {
            closeAllToolPopups(); 
            canvas.freeDrawingBrush = new fabric.SprayBrush(canvas);
            canvas.freeDrawingBrush.color = activeColor;
            canvas.freeDrawingBrush.width = 15;
            changeMode(true);
        });

        document.getElementById('btn-shapes').addEventListener('click', () => {
            const popup = document.getElementById('popup-shapes');
            const isShowing = popup.style.display === 'block';
            closeAllToolPopups();
            if (!isShowing) popup.style.display = 'block';
        });

        document.querySelectorAll('.shape-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                changeMode(false);
                const shapeType = e.target.getAttribute('data-shape');
                const commonProps = {
                    top: canvas.height / 2 - 40, 
                    left: canvas.width / 2 - 40, 
                    fill: activeColor 
                };
                
                let newShape;
                
                if (shapeType === 'heart') {
                    newShape = new fabric.Path('M 40 80 C 40 80 0 50 0 20 C 0 0 30 0 40 20 C 50 0 80 0 80 20 C 80 50 40 80 40 80 Z', { ...commonProps });
                } else if (shapeType === 'star') {
                    const starPoints = [
                        {x: 40, y: 0}, {x: 52, y: 28}, {x: 80, y: 28},
                        {x: 57, y: 45}, {x: 66, y: 75}, {x: 40, y: 56},
                        {x: 14, y: 75}, {x: 23, y: 45}, {x: 0, y: 28}, {x: 28, y: 28}
                    ];
                    newShape = new fabric.Polygon(starPoints, { ...commonProps });
                } else if (shapeType === 'speech') {
                    const speechPoints = [
                        {x:10,y:10}, {x:70,y:10}, {x:70,y:50}, {x:50,y:50}, {x:30,y:70}, {x:30,y:50}, {x:10,y:50}
                    ];
                    newShape = new fabric.Polygon(speechPoints, { ...commonProps });
                } else if (shapeType === 'rect') {
                    newShape = new fabric.Rect({ ...commonProps, width: 80, height: 80 });
                } else if (shapeType === 'triangle') {
                    newShape = new fabric.Triangle({ ...commonProps, width: 80, height: 80 });
                } else if (shapeType === 'cloud') {
                    newShape = new fabric.Path('M 25 50 Q 10 50 10 35 Q 10 20 25 20 C 25 5 55 5 55 20 Q 75 20 75 35 Q 75 50 55 50 Z', { ...commonProps });
                } else if (shapeType === 'lightning') {
                    const lightningPoints = [
                        {x:40,y:0}, {x:10,y:40}, {x:35,y:40}, {x:25,y:80}, {x:70,y:30}, {x:45,y:30}
                    ];
                    newShape = new fabric.Polygon(lightningPoints, { ...commonProps });
                } else if (shapeType === 'arrow') {
                    const arrowPoints = [
                        {x:0,y:25}, {x:50,y:25}, {x:50,y:10}, {x:80,y:40}, {x:50,y:70}, {x:50,y:55}, {x:0,y:55}
                    ];
                    newShape = new fabric.Polygon(arrowPoints, { ...commonProps });
                } else if (shapeType === 'circle') {
                    newShape = new fabric.Circle({ ...commonProps, radius: 40 });
                }
                
                if (newShape) {
                    canvas.add(newShape);
                }
                document.getElementById('popup-shapes').style.display = 'none';
            });
        });

        document.getElementById('btn-help').addEventListener('click', () => {
            const popup = document.getElementById('popup-help');
            const isShowing = popup.style.display === 'block';
            popup.style.display = isShowing ? 'none' : 'block';
        });

        document.getElementById('btn-credits').addEventListener('click', () => {
            const popup = document.getElementById('popup-credits');
            const isShowing = popup.style.display === 'block';
            popup.style.display = isShowing ? 'none' : 'block';
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeColor = e.target.getAttribute('data-color');
                if(canvas.freeDrawingBrush) { canvas.freeDrawingBrush.color = activeColor; }
            });
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            const objects = canvas.getObjects();
            if (objects.length > 0) {
                const lastObj = objects[objects.length - 1];
                canvas.remove(lastObj);
                canvas.renderAll();
            }
        });

        // 🌟 아무 곳이나 클릭(터치)하면 send / help / credits 팝업을 숨기는 이벤트
        document.addEventListener('pointerdown', (e) => {
            const sendPopup = document.getElementById('popup-send');
            // send 팝업이 열려있는데, 클릭한 대상이 제출 버튼이 아닐 경우 닫기
            if (sendPopup.style.display === 'block' && e.target.id !== 'submit-btn') {
                sendPopup.style.display = 'none';
            }

            const helpPopup = document.getElementById('popup-help');
            // 도움말 팝업이 열려있는데, 클릭한 대상이 도움말 버튼이 아닐 경우 닫기
            if (helpPopup.style.display === 'block' && e.target.id !== 'btn-help') {
                helpPopup.style.display = 'none';
            }

            const creditsPopup = document.getElementById('popup-credits');
            // 크레딧 팝업이 열려있는데, 클릭한 대상이 크레딧 버튼이 아닐 경우 닫기
            if (creditsPopup.style.display === 'block' && e.target.id !== 'btn-credits') {
                creditsPopup.style.display = 'none';
            }
        });

        // 🌟 서버(/api/upload)가 배포되어 있으므로 활성화
        const SERVER_ENABLED = true;
        // 🌟 왜 저장이 안 되는지 확인하고 싶을 때만 true로 바꾸세요 (에러 내용을 화면에 잠깐 띄워줌)
        const DEBUG_MODE = false;

        document.getElementById('submit-btn').addEventListener('click', () => {
            // 🌟 버튼 클릭 시 send.png 팝업 바로 띄우기
            document.getElementById('popup-send').style.display = 'block';

            const submitBtn = document.getElementById('submit-btn');

            if (!SERVER_ENABLED) {
                // 서버 없이 로컬 테스트할 때: 오류 alert 없이 콘솔에만 로그 남기고 종료
                console.log("(테스트 모드) 서버 미연결 - 업로드 스킵됨");
                return;
            }

            // 🌟 canvas.width/height는 논리적(CSS) 크기라서, devicePixelRatio가 높은
            //    모바일(레티나 등)에서는 실제 캔버스 픽셀 크기보다 작음.
            //    반드시 getElement()의 실제 width/height(내부 픽셀 버퍼 크기)를 써야
            //    이미지가 잘리지 않고 전체가 정상적으로 저장됨.
            const canvasEl = canvas.getElement();
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvasEl.width;
            tempCanvas.height = canvasEl.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            tempCtx.drawImage(canvasEl, 0, 0);
            
            const imgData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
            const data = imgData.data;
            for (let i = 3; i < data.length; i += 4) {
                data[i] = data[i] > 127 ? 255 : 0; 
            }
            tempCtx.putImageData(imgData, 0, 0);

            const alphaDataUrl = tempCanvas.toDataURL({ format: 'png', quality: 1.0 });

            const payload = {
                image: alphaDataUrl,
                filename: `artwork_${Date.now()}.png`
            };

            submitBtn.style.pointerEvents = 'none';

            fetch('/api/upload', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (!response.ok) {
                    // 서버가 200이 아닌 응답(400, 404, 413, 500 등)을 준 경우도 잡아냄
                    return response.text().then(text => {
                        throw new Error(`HTTP ${response.status}: ${text}`);
                    });
                }
                return response.json();
            })
            .then(result => {
                submitBtn.style.pointerEvents = 'auto';
                if(result.success) {
                    console.log("저장된 이미지 주소:", result.url);
                } else {
                    console.error("저장 실패: " + result.error);
                    if (DEBUG_MODE) alert("저장 실패: " + result.error);
                }
            })
            .catch(error => {
                submitBtn.style.pointerEvents = 'auto';
                console.error('Error:', error);
                if (DEBUG_MODE) alert("업로드 에러: " + error.message);
                // alert 제거 - 콘솔에만 남김 (서버 없이 테스트 중 오류 팝업 방지)
            });
        });
    </script>
</body>
</html>
